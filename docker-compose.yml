services:
  api:
    build: .
    container_name: ala_api
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./learning_assistant.db
      - SECRET_KEY=change_me_in_production
    volumes:
      - .:/app

  dashboard:
    build: .
    container_name: ala_dashboard
    command: streamlit run frontend/streamlit_app.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    volumes:
      - .:/app
